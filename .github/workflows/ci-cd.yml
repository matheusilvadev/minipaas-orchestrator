name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven verify
        run: mvn -B clean verify

  docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t paas-platform:${{ github.sha }} .

  deploy:
    name: Deploy Placeholder
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deployment guidance
        run: |
          echo "Configure server deploy steps here."
          echo "Suggested next step: SSH into the Ubuntu host and run docker compose pull/build/up."
